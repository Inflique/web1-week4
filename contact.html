<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's Talk Singers</title>
    <link href="styles/styles.css" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Contact</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="https://imdac.github.io" target="_blank">More</a></li>
        </ul>
    </nav>

    <main>
        <br>
        <!-- We makin a form ho -->
         <form action="contact.html" method="get">
            <section>
                <label for="firstname">First Name</label>
                <input type="text" id="firstname" name="firstname"> 
                <label for="lastname">Last name</label>
                <input type="text" id="lastname" name="lastname">
            </section>
            <br>
            <section>
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </section>
            <br>
            <section>
                <label for="passwordinitial">Create a password</label>
                <input type="password" id="passwordinitial" name="passwordinitial" placeholder="At least 8 characters">
            <br>
                <label for="passwordconfirm">Confirm your password</label>
                <input type="password" id="passwordconfirm" name="passwordconfirm" placeholder="Must match passwords">
            </section>
            <br>
            <section>
                <label for="date">Select a date</label>
                <input type="date" id="date" name="date">
            </section>
            <br>
            <section>
                <label for="model">Which Singer You Want Sir</label>
                <select id="model" name="model">
                    <option>Select one:</option>
                    <option>911 Singer DLS</option>
                    <option>930 Singer</option>
                    <option>Singer Turbo</option>
                </select>

                <label for="burgundy">Burgundy</label>
                <input type="radio" id="burgundy" name="color">

                <label for="quartz">Quartz</label>
                <input type="radio" id="quartz" name="color">

                <label for="teal">Teal</label>
                <input type="radio" id="teal" name="color">
            </section>
            <br>
            <section>
                <label for="howmany">How many Porsches?</label>
                <input type="number" id="howmany" min="6" max="7" name="howmany">
            </section>
            <br>
            <section>
                <input type="submit" value="Submit" name="submit">
            </section>
         </form>
    </main>

    <footer>

    </footer>
</body>
</html>
